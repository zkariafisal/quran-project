<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 50px;
      background: linear-gradient(135deg, #1e2b3c, #0d1a24);
      color: white;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    .loading {
      margin-top: 2rem;
      font-size: 1rem;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <h1>🕌 القرآن الكريم</h1>
  <p>جاري تحميل المصحف الشريف...</p>
  <div class="loading">الرجاء الانتظار</div>
  <div id="root"></div>
  <script>
    // محاولة تحميل الملف الرئيسي
    setTimeout(function() {
      var script = document.createElement('script');
      script.src = '/static/dist/main.js';
      document.body.appendChild(script);
    }, 1000);
  </script>
</body>
</html>
