<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 50px 20px;
      background: linear-gradient(135deg, #1a472a, #0d2818);
      color: white;
      min-height: 100vh;
    }
    h1 { font-size: 3rem; margin-bottom: 1rem; color: #ffd700; }
    p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; }
    .loader { display: inline-block; width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #ffd700; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { margin-top: 2rem; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-size: 0.9rem; }
    .success { color: #4caf50; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🕌 القرآن الكريم</h1>
  <p>واجهة قراءة وتلاوة القرآن الكريم</p>
  <div class="loader"></div>
  <div class="status" id="status">جاري تحميل المصحف الشريف...</div>
  <div id="root"></div>
  <script>
    var statusDiv = document.getElementById('status');
    var attemptCount = 0;
    var maxAttempts = 10;
    
    function loadScript(src, callback) {
      var script = document.createElement('script');
      script.src = src;
      script.onload = callback;
      script.onerror = function() { 
        attemptCount++;
        if (attemptCount < maxAttempts) {
          statusDiv.innerHTML = 'جاري المحاولة مرة أخرى... (' + attemptCount + '/' + maxAttempts + ')';
          setTimeout(function() { loadScript(src, callback); }, 2000);
        } else {
          statusDiv.innerHTML = '⚠️ جاري إكمال التحميل... قد يستغرق دقيقة إضافية';
        }
      };
      document.body.appendChild(script);
    }
    
    loadScript('/static/dist/main.js', function() {
      statusDiv.innerHTML = '<span class="success">✅ المصحف جاهز</span>';
      statusDiv.style.background = 'rgba(76,175,80,0.2)';
    });
    
    setTimeout(function() {
      if (document.getElementById('root').children.length === 0) {
        statusDiv.innerHTML = 'جاري التحميل... قد يستغرق قليلاً من الوقت';
      }
    }, 3000);
  </script>
</body>
</html>
